<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Wall Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font: 12px/1.4 monospace;
      text-align: center;
      pointer-events: none;
    }
    #debug-panel {
      display: none;
      position: fixed;
      top: 0; left: 0;
      background: rgba(0,0,0,0.82);
      color: #0ff;
      font: 11px/1.6 monospace;
      padding: 8px 10px;
      max-width: 100vw;
      z-index: 9999;
      pointer-events: none;
      white-space: pre;
      border-bottom-right-radius: 8px;
    }
    #debug-panel.visible { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>
<div id="hint">
  클릭 / 탭 / Space: 장애물 자동 회피 &nbsp;|&nbsp; 벽에 닿으면 자동 방향 전환
</div>
<div id="debug-panel"></div>

<script>
// ─────────────────────────────────────────
// Canvas & sizing
// ─────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hintEl = document.getElementById('hint');
const debugPanel = document.getElementById('debug-panel');

// ─────────────────────────────────────────
// Debug / Developer mode
// ─────────────────────────────────────────
let debugMode = false;
const debugLog = [];   // circular log of recent resize/orientation events
const DEBUG_LOG_MAX = 12;

function dbLog(msg) {
  const ts = new Date().toISOString().slice(11, 23);
  debugLog.push('[' + ts + '] ' + msg);
  if (debugLog.length > DEBUG_LOG_MAX) debugLog.shift();
}

function toggleDebug() {
  debugMode = !debugMode;
  debugPanel.classList.toggle('visible', debugMode);
  dbLog('debug ' + (debugMode ? 'ON' : 'OFF'));
}

function updateDebugPanel() {
  if (!debugMode) return;
  const vv = window.visualViewport;
  const ori = screen.orientation ? screen.orientation.type : (window.orientation + '°');
  const lines = [
    '── RESIZE STATE ───────────────────────',
    'window  : ' + window.innerWidth + ' × ' + window.innerHeight,
    'vViewport: ' + (vv ? vv.width.toFixed(0) + ' × ' + vv.height.toFixed(0) + ' scale=' + vv.scale.toFixed(2) : 'N/A'),
    'screen  : ' + screen.width + ' × ' + screen.height,
    'orient  : ' + ori,
    'worldAngle: ' + (typeof worldAngle !== 'undefined' ? worldAngle + '°' : '?'),
    'canvas px: ' + canvas.width + ' × ' + canvas.height,
    'canvas css: ' + canvas.style.width + ' × ' + canvas.style.height,
    'canvas pos: ' + (canvas.style.position || 'static') +
      '  T=' + (canvas.style.top || '-') + ' L=' + (canvas.style.left || '-'),
    'transform: ' + (canvas.style.transform || 'none'),
    '── EVENT LOG ───────────────────────────',
    ...debugLog,
  ];
  debugPanel.textContent = lines.join('\n');
}

// Long-press toggle for mobile (3 s)
let debugLongPressTimer = null;
document.addEventListener('touchstart', e => {
  if (e.touches.length >= 2) {   // two-finger tap = instant toggle
    toggleDebug();
    return;
  }
  debugLongPressTimer = setTimeout(toggleDebug, 3000);
}, { passive: true });
document.addEventListener('touchend',   () => { clearTimeout(debugLongPressTimer); }, { passive: true });
document.addEventListener('touchmove',  () => { clearTimeout(debugLongPressTimer); }, { passive: true });

const BASE_W = 800;
const BASE_H = 400;

// World rotation (degrees: 0 / 90 / 180 / 270 – applied statically in draw)
let worldAngle = 0;

function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  dbLog('resize W=' + W + ' H=' + H);

  const angle = worldAngle;
  const isRotated = (W <= H) && (angle === 90 || angle === 270);

  if (W > H) {
    // Landscape: fill the full screen
    canvas.style.position = '';
    canvas.style.top = '';
    canvas.style.left = '';
    canvas.style.transform = '';
    canvas.style.transformOrigin = '';
    const scale = H / BASE_H;
    canvas.width  = Math.round(W / scale);
    canvas.height = BASE_H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
  } else if (isRotated) {
    // Portrait phone but game world rotated 90/270°:
    // Size the canvas as a landscape element (H x W) and CSS-rotate it so it fills the portrait screen.
    // After rotation, BASE_H (game visual "height") maps to portrait W, so scale = W/BASE_H.
    const scale = W / BASE_H;
    canvas.width  = Math.round(H / scale);   // portrait H becomes the game's visual scroll length
    canvas.height = BASE_H;
    // Place the landscape element so its center aligns with the screen center,
    // then CSS-rotate by -angle to orient it portrait, filling the W x H viewport.
    canvas.style.position = 'fixed';
    canvas.style.width    = H + 'px';               // landscape element width  = portrait H
    canvas.style.height   = W + 'px';               // landscape element height = portrait W
    canvas.style.top      = ((H - W) / 2) + 'px';  // shift down  so element center y = H/2
    canvas.style.left     = (-(H - W) / 2) + 'px'; // shift left so element center x = W/2
    canvas.style.transform = 'rotate(' + (-angle) + 'deg)';
    canvas.style.transformOrigin = 'center center';
  } else {
    // Portrait (worldAngle 0/180): scale to fit
    canvas.style.position = '';
    canvas.style.top = '';
    canvas.style.left = '';
    canvas.style.transform = '';
    canvas.style.transformOrigin = '';
    const scale = Math.min(W / BASE_W, H / BASE_H);
    canvas.width  = BASE_W;
    canvas.height = BASE_H;
    canvas.style.width  = (BASE_W * scale) + 'px';
    canvas.style.height = (BASE_H * scale) + 'px';
  }
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────
// Constants
// ─────────────────────────────────────────
const FLOOR_THICKNESS = 20;
const FLOOR_Y         = BASE_H - FLOOR_THICKNESS;
const PLAYER_X        = 280;
const GRAVITY         = 0.65;
const JUMP_FORCE      = -14.5;
const SCROLL_SPEED    = 5.5;
const PLAYER_W        = 38;
const PLAYER_H        = 60;
const CROUCH_H        = 28;

// Colour palettes per orientation (cycles 0→1→2→3→0…)
const PALETTES = [
  { bg: '#0d0d2b', floor: '#1e2d6e', accent: '#4a6fd4', playerFill: '#00e5ff', wallCol: '#cc44ff' },
  { bg: '#1a0a00', floor: '#6e2a00', accent: '#d46a00', playerFill: '#ffcc00', wallCol: '#ff44aa' },
  { bg: '#001a0a', floor: '#006e2a', accent: '#00d46a', playerFill: '#ff6600', wallCol: '#44ffcc' },
  { bg: '#0a001a', floor: '#2a006e', accent: '#6a00d4', playerFill: '#44ffaa', wallCol: '#ff4444' },
];

// ─────────────────────────────────────────
// Game state
// ─────────────────────────────────────────
const STATE = { TITLE: 0, PLAYING: 1, GAME_OVER: 2 };

let state;
let score;
let hiScore = 0;
let paletteIdx;

// Player
let player;

// Obstacles & walls
let obstacles;
let nextObstacleTimer;
let nextWallTimer;     // frames until next wall is spawned
let wallX;             // x position of approaching wall (NaN = none)
let wallWarned;        // flash warning shown

// Camera shake
let shakeX = 0, shakeY = 0, shakeDuration = 0;

// ─────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function shake(duration = 12) {
  shakeDuration = duration;
}

function initGame() {
  state       = STATE.PLAYING;
  score       = 0;
  paletteIdx  = 0;
  worldAngle  = 0;
  resize();
  wallX         = NaN;
  wallWarned    = false;
  obstacles     = [];
  nextObstacleTimer = 160;
  nextWallTimer     = 700;

  player = {
    x: PLAYER_X,
    y: FLOOR_Y - PLAYER_H,
    vy: 0,
    w: PLAYER_W,
    h: PLAYER_H,
    onGround: true,
    crouching: false,
    crouchTimer: 0,
    legPhase: 0,          // animation
    trailParticles: [],
  };
}

// ─────────────────────────────────────────
// Input
// ─────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key;
  if (k === 'd' || k === 'D') { toggleDebug(); return; }
  if (!keys[k]) {
    keys[k] = true;
    if (state === STATE.TITLE || state === STATE.GAME_OVER) {
      initGame();
      return;
    }
    if (state === STATE.PLAYING) {
      if (k === ' ' || k === 'ArrowUp' || k === 'w') handleAction();
      if (k === 'ArrowDown' || k === 's')            crouchPlayer();
    }
  }
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// ── Auto-action: choose jump or crouch based on nearest obstacle ──
function handleAction() {
  if (state !== STATE.PLAYING) return;
  const upcoming = obstacles.filter(o => o.x + o.w > player.x).sort((a, b) => a.x - b.x);
  if (upcoming.length > 0 && upcoming[0].type === 'short') {
    crouchPlayer();
  } else {
    jumpPlayer();
  }
}

// Touch – single tap anywhere triggers auto-action
document.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === STATE.TITLE || state === STATE.GAME_OVER) { initGame(); return; }
  if (state === STATE.PLAYING) handleAction();
}, { passive: false });

// Mouse click – same behaviour
document.addEventListener('click', () => {
  if (state === STATE.TITLE || state === STATE.GAME_OVER) { initGame(); return; }
  if (state === STATE.PLAYING) handleAction();
});

// ─────────────────────────────────────────
// Player actions
// ─────────────────────────────────────────
function jumpPlayer() {
  if (player.onGround && !player.crouching) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    spawnJumpParticles();
  }
}

function crouchPlayer() {
  if (!player.crouching) {
    player.crouching = true;
    player.crouchTimer = 40;
    player.h = CROUCH_H;
    player.y = FLOOR_Y - CROUCH_H;
  }
}

function releasePlayer() {
  if (player.crouching) {
    player.crouching = false;
    player.h = PLAYER_H;
    player.y = FLOOR_Y - PLAYER_H;
  }
}

// ─────────────────────────────────────────
// Particles
// ─────────────────────────────────────────
function spawnJumpParticles() {
  const pal = PALETTES[paletteIdx];
  for (let i = 0; i < 8; i++) {
    player.trailParticles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h,
      vx: rand(-2.5, 2.5),
      vy: rand(1, 4),
      life: rand(15, 30),
      maxLife: 30,
      r: rand(3, 7),
      color: pal.playerFill,
    });
  }
}

function spawnLandParticles() {
  const pal = PALETTES[paletteIdx];
  for (let i = 0; i < 6; i++) {
    player.trailParticles.push({
      x: player.x + rand(0, player.w),
      y: FLOOR_Y,
      vx: rand(-3, 3),
      vy: rand(-3, -1),
      life: rand(10, 20),
      maxLife: 20,
      r: rand(2, 5),
      color: pal.accent,
    });
  }
}

function updateParticles() {
  const p = player.trailParticles;
  for (let i = p.length - 1; i >= 0; i--) {
    p[i].x += p[i].vx;
    p[i].y += p[i].vy;
    p[i].vy += 0.2;
    p[i].life--;
    if (p[i].life <= 0) p.splice(i, 1);
  }
}

// ─────────────────────────────────────────
// Obstacle spawning
// ─────────────────────────────────────────
function spawnObstacle() {
  const type = Math.random() < 0.5 ? 'tall' : 'short';
  if (type === 'tall') {
    const h = randInt(60, 100);
    obstacles.push({ x: canvas.width + 20, y: FLOOR_Y - h, w: 36, h, type: 'tall' });
  } else {
    // Overhead obstacle – player must crouch to pass under it
    // Must block standing player (box top ~322) but clear crouching player (box top ~354)
    const h = randInt(325, 348);
    obstacles.push({ x: canvas.width + 20, y: 0, w: 48, h, type: 'short' });
  }
  // Schedule next obstacle (gets faster over time)
  const speed = Math.max(40, 110 - Math.floor(score / 30));
  nextObstacleTimer = randInt(speed, speed + 60);
}

function spawnWall() {
  // Place wall far ahead; next wall spawned after player clears this one
  wallX = canvas.width + 80;
  wallWarned = false;
  nextWallTimer = 750;  // time until next wall (after this one is cleared)
}

// ─────────────────────────────────────────
// AABB collision
// ─────────────────────────────────────────
function overlaps(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ─────────────────────────────────────────
// Update
// ─────────────────────────────────────────
function update() {
  if (state === STATE.TITLE || state === STATE.GAME_OVER) return;

  // Camera shake
  if (shakeDuration > 0) {
    shakeX = rand(-4, 4);
    shakeY = rand(-4, 4);
    shakeDuration--;
  } else {
    shakeX = shakeY = 0;
  }

  // ── Rotating state ──────────────────────
  // (handled inline: wall hit immediately rotates and continues)

  score++;

  // ── Player physics ──────────────────────
  if (!player.onGround) {
    player.vy += GRAVITY;
    player.y  += player.vy;
  }
  player.legPhase += player.onGround && !player.crouching ? 0.22 : 0;

  if (player.crouchTimer > 0) {
    player.crouchTimer--;
    if (player.crouchTimer === 0 && player.crouching) releasePlayer();
  }

  // Floor collision
  const floorTopForPlayer = FLOOR_Y - player.h;
  if (player.y >= floorTopForPlayer) {
    if (!player.onGround) spawnLandParticles();
    player.y  = floorTopForPlayer;
    player.vy = 0;
    player.onGround = true;
  } else {
    if (player.y < FLOOR_Y - player.h) player.onGround = false;
  }

  updateParticles();

  // ── Obstacle logic ───────────────────────
  if (state === STATE.PLAYING) {
    // Timer for next obstacle
    nextObstacleTimer--;
    if (nextObstacleTimer <= 0) spawnObstacle();

    // Move obstacles
    for (const o of obstacles) o.x -= SCROLL_SPEED;

    // Remove off-screen obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
    }

    // Collision detection
    const playerBox = { x: player.x + 4, y: player.y + 2, w: player.w - 8, h: player.h - 2 };
    for (const o of obstacles) {
      if (overlaps(playerBox, o)) {
        state = STATE.GAME_OVER;
        if (score > hiScore) hiScore = score;
        shake(20);
        return;
      }
    }

    // ── Wall logic ─────────────────────────
    // Spawn wall on a dedicated countdown timer
    if (isNaN(wallX)) {
      nextWallTimer--;
      if (nextWallTimer <= 0) spawnWall();
    }

    if (!isNaN(wallX)) {
      wallX -= SCROLL_SPEED;

      // Warning flash when wall is close
      if (!wallWarned && wallX < canvas.width * 0.6) {
        wallWarned = true;
        shake(8);
      }

      // Player reaches wall → auto-rotate 90° and continue
      const wallLeft = wallX;
      const playerRight = player.x + player.w;
      if (playerRight + 2 >= wallLeft && wallLeft > 0) {
        worldAngle  = (worldAngle + 90) % 360;
        paletteIdx  = (paletteIdx + 1) % PALETTES.length;
        wallX       = NaN;
        nextWallTimer     = 600;
        nextObstacleTimer = 120;
        obstacles   = [];
        shake(10);
        resize();
      }
    }
  }
}

// ─────────────────────────────────────────
// Draw helpers
// ─────────────────────────────────────────
function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─────────────────────────────────────────
// Draw
// ─────────────────────────────────────────
function draw() {
  const pal = PALETTES[paletteIdx];

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── Title screen ───────────────────────
  if (state === STATE.TITLE) {
    drawTitleScreen();
    return;
  }

  // ── Apply world rotation ────────────────
  // For portrait + worldAngle 90/270, resize() already CSS-rotates the canvas
  // element to fill the screen — no in-canvas rotation needed (it would clip the
  // 866 px scroll axis to the canvas's short 400 px dimension).
  // For landscape or worldAngle 0/180 the in-canvas rotation is still used.
  const isCSSRotated = (window.innerWidth <= window.innerHeight) &&
                       (worldAngle === 90 || worldAngle === 270);
  const rotRad = isCSSRotated ? 0 : worldAngle * Math.PI / 180;

  ctx.save();
  ctx.translate(canvas.width / 2 + shakeX, BASE_H / 2 + shakeY);
  ctx.rotate(rotRad);
  ctx.translate(-canvas.width / 2, -BASE_H / 2);

  // Background
  ctx.fillStyle = pal.bg;
  ctx.fillRect(-BASE_W, -BASE_H, BASE_W * 3, BASE_H * 3);

  // Parallax grid lines (horizontal)
  ctx.strokeStyle = hexAlpha(pal.accent, 0.08);
  ctx.lineWidth = 1;
  const gridOff = (score * SCROLL_SPEED * 0.3) % 80;
  for (let y = -BASE_H; y < BASE_H * 2; y += 80) {
    ctx.beginPath();
    ctx.moveTo(-BASE_W, y + gridOff);
    ctx.lineTo(BASE_W * 2, y + gridOff);
    ctx.stroke();
  }

  // Parallax vertical lines
  const vGridOff = (score * SCROLL_SPEED * 0.5) % 120;
  for (let x = -BASE_W; x < BASE_W * 2; x += 120) {
    ctx.beginPath();
    ctx.moveTo(x - vGridOff, -BASE_H);
    ctx.lineTo(x - vGridOff, BASE_H * 2);
    ctx.stroke();
  }

  // Floor
  const grad = ctx.createLinearGradient(0, FLOOR_Y, 0, BASE_H);
  grad.addColorStop(0, pal.floor);
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(-BASE_W, FLOOR_Y, BASE_W * 3, BASE_H);

  // Floor top edge glow
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 3;
  ctx.shadowColor = pal.accent;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(-BASE_W, FLOOR_Y);
  ctx.lineTo(BASE_W * 2, FLOOR_Y);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Floor tile marks
  ctx.strokeStyle = hexAlpha(pal.accent, 0.25);
  ctx.lineWidth = 1;
  const tileOff = (score * SCROLL_SPEED) % 80;
  for (let tx = -BASE_W; tx < BASE_W * 2; tx += 80) {
    ctx.beginPath();
    ctx.moveTo(tx - tileOff, FLOOR_Y);
    ctx.lineTo(tx - tileOff, BASE_H);
    ctx.stroke();
  }

  // Obstacles
  for (const o of obstacles) {
    const col = o.type === 'tall' ? '#ff3355' : '#ff7700';
    const glow = o.type === 'tall' ? '#ff0044' : '#ff5500';
    drawRoundedRect(o.x, o.y, o.w, o.h, 4, col, null);
    ctx.shadowColor = glow;
    ctx.shadowBlur = 12;
    drawRoundedRect(o.x + 2, o.y + 2, o.w - 4, o.h - 4, 2, hexAlpha(glow, 0.4), null);
    ctx.shadowBlur = 0;

    // Icon – for overhead obstacles show ↓ near the bottom edge (gap hint)
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    if (o.type === 'tall') {
      ctx.fillText('↑', o.x + o.w / 2, o.y + o.h / 2 + 5);
    } else {
      ctx.fillText('↓', o.x + o.w / 2, o.y + o.h - 8);
    }
  }

  // Wall
  if (!isNaN(wallX)) {
    const flash = Math.sin(Date.now() * 0.015) * 0.5 + 0.5;
    ctx.shadowColor = pal.wallCol;
    ctx.shadowBlur = 20 + flash * 15;
    ctx.fillStyle = pal.wallCol;
    ctx.fillRect(wallX, 0, 38, FLOOR_Y);
    ctx.fillStyle = hexAlpha(pal.wallCol, 0.4);
    ctx.fillRect(wallX + 4, 0, 30, FLOOR_Y);
    ctx.shadowBlur = 0;

    // Arrow hint on wall
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('↑', wallX + 19, FLOOR_Y / 2);
  }

  // Particles
  for (const p of player.trailParticles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player
  drawPlayer(pal);

  ctx.restore();

  // ── HUD (outside rotation) ─────────────
  drawHUD(pal);

  // ── Overlay states ─────────────────────
  if (state === STATE.GAME_OVER) drawGameOver();
}

function drawPlayer(pal) {
  const px = player.x;
  const py = player.y;
  const pw = player.w;
  const ph = player.h;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(px + pw / 2, FLOOR_Y + 4, pw * 0.6, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body glow
  ctx.shadowColor = pal.playerFill;
  ctx.shadowBlur = 14;

  if (player.crouching) {
    // Crouched rectangle
    drawRoundedRect(px, py, pw, ph, 5, pal.playerFill, null);
    ctx.fillStyle = hexAlpha(pal.bg, 0.5);
    ctx.fillRect(px + pw * 0.3, py + ph * 0.2, pw * 0.4, ph * 0.6);
  } else {
    // Body
    drawRoundedRect(px + 5, py + ph * 0.3, pw - 10, ph * 0.5, 4, pal.playerFill, null);

    // Head
    ctx.fillStyle = pal.playerFill;
    ctx.beginPath();
    ctx.arc(px + pw / 2, py + ph * 0.18, pw * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = pal.bg;
    ctx.beginPath();
    ctx.arc(px + pw * 0.62, py + ph * 0.15, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px + pw * 0.63, py + ph * 0.14, 2, 0, Math.PI * 2);
    ctx.fill();

    // Legs (animated)
    ctx.strokeStyle = pal.playerFill;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    const legSwing = player.onGround ? Math.sin(player.legPhase) * 12 : 0;

    // Left leg
    ctx.beginPath();
    ctx.moveTo(px + pw * 0.35, py + ph * 0.78);
    ctx.lineTo(px + pw * 0.25 + legSwing, py + ph);
    ctx.stroke();

    // Right leg
    ctx.beginPath();
    ctx.moveTo(px + pw * 0.65, py + ph * 0.78);
    ctx.lineTo(px + pw * 0.75 - legSwing, py + ph);
    ctx.stroke();

    // Arm (pumping)
    const armSwing = player.onGround ? Math.sin(player.legPhase + Math.PI) * 8 : -6;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(px + pw * 0.5, py + ph * 0.4);
    ctx.lineTo(px + pw * 0.15, py + ph * 0.55 + armSwing);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

function drawHUD(pal) {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + Math.floor(score / 10), 14, 30);
  ctx.fillStyle = hexAlpha('#ffffff', 0.5);
  ctx.font = '13px monospace';
  ctx.fillText('BEST  ' + Math.floor(hiScore / 10), 14, 50);

  // Orientation indicator (top right)
  const labels = ['→', '↑', '←', '↓'];
  const label = labels[paletteIdx % 4];
  ctx.fillStyle = pal.accent;
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(label, canvas.width - 14, 30);

  // Rotation count
  ctx.fillStyle = hexAlpha('#ffffff', 0.5);
  ctx.font = '13px monospace';
  ctx.fillText('×' + paletteIdx, canvas.width - 14, 50);

  // Wall incoming warning bar (when wall is on screen and approaching)
  if (!isNaN(wallX) && state === STATE.PLAYING) {
    const dist = wallX - PLAYER_X;
    const maxDist = canvas.width + 80 - PLAYER_X;
    const frac = Math.max(0, Math.min(1, 1 - dist / maxDist));
    const pulse = Math.abs(Math.sin(Date.now() * 0.012));
    const barW = 180;
    const bx = canvas.width / 2 - barW / 2;
    const by = 10;
    ctx.fillStyle = hexAlpha(pal.wallCol, 0.25);
    ctx.fillRect(bx, by, barW, 12);
    ctx.fillStyle = pal.wallCol;
    ctx.globalAlpha = 0.6 + pulse * 0.4;
    ctx.fillRect(bx, by, barW * frac, 12);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = pal.wallCol;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, barW, 12);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WALL ↑', canvas.width / 2, by + 10);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#ff3355';
  ctx.font = 'bold 52px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.fillText('점수: ' + Math.floor(score / 10), canvas.width / 2, canvas.height / 2 + 10);
  ctx.fillText('최고: ' + Math.floor(hiScore / 10), canvas.width / 2, canvas.height / 2 + 40);

  const pulse = Math.sin(Date.now() * 0.006) * 0.4 + 0.6;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('탭 또는 아무 키나 눌러 재시작', canvas.width / 2, canvas.height / 2 + 88);
  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  ctx.fillStyle = '#0d0d2b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Animated grid
  ctx.strokeStyle = 'rgba(74,111,212,0.12)';
  ctx.lineWidth = 1;
  for (let y = 0; y < canvas.height; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  for (let x = 0; x < canvas.width; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }

  // Title
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WALL', canvas.width / 2, 130);

  ctx.shadowColor = '#ff00aa';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ff00aa';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('RUNNER', canvas.width / 2, 200);
  ctx.shadowBlur = 0;

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '16px monospace';
  ctx.fillText('클릭 / 탭 한 번으로 장애물 자동 회피!', canvas.width / 2, 265);
  ctx.fillText('↑ 빨간 장애물 → 점프  |  주황 천장 → 웅크리기', canvas.width / 2, 290);

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '13px monospace';
  ctx.fillText('장애물을 피하세요! 벽에 닿으면 자동으로 방향이 전환됩니다!', canvas.width / 2, 330);

  const pulse = Math.sin(Date.now() * 0.005) * 0.4 + 0.6;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('탭 또는 아무 키나 눌러 시작', canvas.width / 2, 375);
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────
// Game loop
// ─────────────────────────────────────────
state = STATE.TITLE;

function loop() {
  update();
  draw();
  updateDebugPanel();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
