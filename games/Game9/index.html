<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Gravity Maze</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #060612;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    #wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      color: #9ca3af;
      font-size: clamp(12px, 3vw, 15px);
    }
    #hud span { color: #c4b5fd; font-weight: bold; }
    canvas { display: block; }
    #controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .grav-btn {
      font-family: inherit;
      font-size: clamp(20px, 5vw, 28px);
      background: #1a1a2e;
      color: #c4b5fd;
      border: 1px solid #3d3d6e;
      border-radius: 12px;
      width: clamp(56px, 14vw, 70px);
      height: clamp(56px, 14vw, 70px);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .grav-btn:hover, .grav-btn:active {
      background: #2d2d5e;
      border-color: #7c3aed;
      box-shadow: 0 0 14px rgba(124,58,237,0.5);
    }
    .grav-btn.active {
      background: #3d2d8e;
      border-color: #a78bfa;
      box-shadow: 0 0 20px rgba(167,139,250,0.6);
    }
    #undoBtn {
      font-family: inherit;
      font-size: clamp(12px, 3vw, 14px);
      background: #1a1a2e;
      color: #9ca3af;
      border: 1px solid #3d3d6e;
      border-radius: 99px;
      padding: 8px 18px;
      cursor: pointer;
    }
    #undoBtn:hover { border-color: #7c3aed; color: #c4b5fd; }
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 20px;
      background: rgba(6,6,18,0.93);
      border-radius: 12px;
      cursor: pointer;
      z-index: 10;
    }
    .overlay h1 {
      font-size: clamp(30px, 8vw, 48px);
      color: #a78bfa;
      text-shadow: 0 0 24px #a78bfa, 0 0 60px #a78bfa44;
      letter-spacing: 4px;
      text-align: center;
    }
    .overlay .sub {
      font-size: clamp(12px, 3vw, 15px);
      color: rgba(255,255,255,0.65);
      text-align: center;
      line-height: 1.8;
      max-width: 320px;
    }
    .overlay .btn {
      margin-top: 6px;
      font-family: inherit; font-size: clamp(13px, 3.5vw, 16px);
      color: #050510; background: #a78bfa;
      border: none; border-radius: 999px;
      padding: 10px 34px; letter-spacing: 2px;
      cursor: pointer;
      animation: pulse-btn 1.4s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 0 14px #a78bfa88; }
      50%      { box-shadow: 0 0 30px #a78bfacc, 0 0 60px #a78bfa44; }
    }
    .hidden { display: none !important; }
    #backLink {
      margin-top: 8px;
      font-size: 11px;
      color: #4b5563;
      text-decoration: none;
    }
    #backLink:hover { color: #9ca3af; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>Level <span id="levelNum">1</span></div>
    <div>Gems <span id="gemCount">0/0</span></div>
    <div>Moves <span id="moveCount">0</span></div>
  </div>
  <canvas id="c"></canvas>
  <div id="controls">
    <button class="grav-btn" id="btnUp"   data-dir="up">↑</button>
    <button class="grav-btn" id="btnLeft" data-dir="left">←</button>
    <button class="grav-btn" id="btnDown" data-dir="down">↓</button>
    <button class="grav-btn" id="btnRight"data-dir="right">→</button>
    <button id="undoBtn">↩ Undo</button>
  </div>
  <a id="backLink" href="../../index.html">← Back to Games</a>

  <!-- Title -->
  <div class="overlay" id="titleScreen">
    <h1>GRAVITY<br>MAZE</h1>
    <p class="sub">
      Flip gravity to slide the ball through the maze.<br><br>
      ↑ ↓ ← → to set gravity direction<br>
      The ball slides until it hits a wall.<br><br>
      Collect all 💎 gems, then reach the 🚀 exit!
    </p>
    <button class="btn" id="startBtn">Start</button>
  </div>

  <!-- Level Clear -->
  <div class="overlay hidden" id="clearScreen">
    <h1 style="color:#34d399;text-shadow:0 0 24px #34d399,0 0 60px #34d39944;">CLEAR!</h1>
    <p class="sub" id="clearMsg"></p>
    <button class="btn" style="background:#34d399" id="nextBtn">Next Level →</button>
  </div>

  <!-- Victory -->
  <div class="overlay hidden" id="victoryScreen">
    <h1 style="color:#fbbf24;text-shadow:0 0 24px #fbbf24,0 0 60px #fbbf2444;">ALL CLEAR!</h1>
    <p class="sub" id="victoryMsg"></p>
    <button class="btn" style="background:#fbbf24" id="playAgainBtn">Play Again</button>
  </div>
</div>

<script>
'use strict';

// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const COLS = 6, ROWS = 6;
const CELL = Math.min(Math.floor((Math.min(window.innerWidth, window.innerHeight, 480) - 24) / COLS), 72);
canvas.width  = CELL * COLS;
canvas.height = CELL * ROWS;

// ── Tile types ───────────────────────────────────────────────
const T = { EMPTY: 0, WALL: 1, GEM: 2, EXIT: 3, START: 4 };

// ── Levels ───────────────────────────────────────────────────
// Each level: grid (6x6 array of tile types), ball start position
const LEVELS = [
  // Level 1 — introductory
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,0,0,2,1],
      [1,1,1,0,1,1],
      [1,2,0,0,0,1],
      [1,0,1,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 5
  },
  // Level 2
  {
    grid: [
      [1,1,1,1,1,1],
      [1,0,2,1,0,1],
      [1,4,0,0,0,1],
      [1,1,0,1,2,1],
      [1,0,0,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 6
  },
  // Level 3
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,1,0,2,1],
      [1,0,0,0,1,1],
      [1,2,1,0,0,1],
      [1,0,0,1,3,1],
      [1,1,1,1,1,1],
    ],
    par: 7
  },
  // Level 4
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,0,1,0,1],
      [1,0,2,0,2,1],
      [1,1,0,1,0,1],
      [1,2,0,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 7
  },
  // Level 5
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,0,0,0,1],
      [1,0,1,2,1,1],
      [1,2,0,1,0,1],
      [1,1,0,2,3,1],
      [1,1,1,1,1,1],
    ],
    par: 8
  },
  // Level 6 — harder
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,0,2,1,1],
      [1,1,0,0,0,1],
      [1,2,1,1,0,1],
      [1,0,2,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 8
  },
  // Level 7
  {
    grid: [
      [1,1,1,1,1,1],
      [1,2,1,0,4,1],
      [1,0,0,0,1,1],
      [1,1,2,0,0,1],
      [1,3,0,1,2,1],
      [1,1,1,1,1,1],
    ],
    par: 9
  },
  // Level 8
  {
    grid: [
      [1,1,1,1,1,1],
      [1,0,2,1,4,1],
      [1,0,1,0,0,1],
      [1,2,0,0,1,1],
      [1,3,1,2,0,1],
      [1,1,1,1,1,1],
    ],
    par: 9
  },
  // Level 9
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,0,2,1,1],
      [1,1,0,1,2,1],
      [1,2,0,0,1,1],
      [1,1,2,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 10
  },
  // Level 10 — challenging
  {
    grid: [
      [1,1,1,1,1,1],
      [1,4,2,1,2,1],
      [1,0,0,0,1,1],
      [1,1,2,0,0,1],
      [1,2,1,0,3,1],
      [1,1,1,1,1,1],
    ],
    par: 11
  },
];

// ── State ────────────────────────────────────────────────────
let currentLevel = 0;
let grid, ballR, ballC, gems, gemTotal, moves, history, gravDir;
let animBall = null; // {fromR, fromC, toR, toC, progress}
let celebrating = false;

function loadLevel(idx) {
  const lvl = LEVELS[idx];
  grid = lvl.grid.map(row => [...row]);
  // Find start
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === T.START) { ballR = r; ballC = c; grid[r][c] = T.EMPTY; }
  // Count gems
  gemTotal = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === T.GEM) gemTotal++;
  gems = 0;
  moves = 0;
  history = [];
  gravDir = null;
  animBall = null;
  celebrating = false;
  updateHUD();
  setActiveGravBtn(null);
}

function updateHUD() {
  document.getElementById('levelNum').textContent = currentLevel + 1;
  document.getElementById('gemCount').textContent = gems + '/' + gemTotal;
  document.getElementById('moveCount').textContent = moves;
}

function setActiveGravBtn(dir) {
  document.querySelectorAll('.grav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === dir);
  });
}

// ── Slide logic ───────────────────────────────────────────────
const DR = { up: -1, down: 1, left: 0,  right: 0 };
const DC = { up:  0, down: 0, left: -1, right: 1 };

function applyGravity(dir) {
  if (animBall || celebrating) return;
  const dr = DR[dir], dc = DC[dir];
  let r = ballR, c = ballC;
  // Slide until hitting wall
  while (true) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
    if (grid[nr][nc] === T.WALL) break;
    r = nr; c = nc;
    if (grid[r][c] === T.GEM || grid[r][c] === T.EXIT) break;
  }
  if (r === ballR && c === ballC) {
    // No movement — flash the button
    return;
  }
  // Save state for undo
  history.push({ ballR, ballC, grid: grid.map(row => [...row]), gems, moves });
  if (history.length > 10) history.shift();

  gravDir = dir;
  moves++;
  // Animate
  animBall = { fromR: ballR, fromC: ballC, toR: r, toC: c, progress: 0 };
  ballR = r; ballC = c;
  updateHUD();
  setActiveGravBtn(dir);
  // Collect gem or check exit on arrival
  requestAnimationFrame(animateLoop);
}

// ── Animation ─────────────────────────────────────────────────
let lastTime = 0;
function animateLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (animBall) {
    animBall.progress += dt * 8; // speed
    if (animBall.progress >= 1) {
      animBall.progress = 1;
      // Land
      const r = animBall.toR, c = animBall.toC;
      if (grid[r][c] === T.GEM) {
        grid[r][c] = T.EMPTY;
        gems++;
        updateHUD();
      } else if (grid[r][c] === T.EXIT) {
        if (gems >= gemTotal) {
          // Level clear!
          animBall = null;
          draw();
          celebrating = true;
          setTimeout(() => showClear(), 400);
          return;
        }
        // Can't exit yet — bounce back effect (just stay)
      }
      animBall = null;
    }
  }
  draw();
  if (animBall) requestAnimationFrame(animateLoop);
}

// ── Drawing ───────────────────────────────────────────────────
const COLORS = {
  wall:  '#1a1a3a',
  empty: '#0d0d22',
  gem:   '#60a5fa',
  exit:  '#34d399',
};

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL, y = r * CELL;
      const tile = grid[r][c];
      // Background
      ctx.fillStyle = tile === T.WALL ? COLORS.wall : COLORS.empty;
      ctx.beginPath();
      ctx.roundRect(x+1, y+1, CELL-2, CELL-2, 4);
      ctx.fill();

      if (tile === T.GEM) {
        drawGem(x + CELL/2, y + CELL/2, CELL * 0.22);
      } else if (tile === T.EXIT) {
        drawExit(x + CELL/2, y + CELL/2, CELL * 0.28, gems < gemTotal);
      }
    }
  }

  // Ball
  let bx, by;
  if (animBall) {
    const p = easeInOut(animBall.progress);
    bx = (animBall.fromC + (animBall.toC - animBall.fromC) * p) * CELL + CELL/2;
    by = (animBall.fromR + (animBall.toR - animBall.fromR) * p) * CELL + CELL/2;
  } else {
    bx = ballC * CELL + CELL/2;
    by = ballR * CELL + CELL/2;
  }
  drawBall(bx, by, CELL * 0.3);
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function drawBall(x, y, r) {
  // Outer glow
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 1.8);
  grad.addColorStop(0, 'rgba(167,139,250,0.6)');
  grad.addColorStop(1, 'rgba(167,139,250,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.8, 0, Math.PI*2);
  ctx.fill();
  // Core
  const coreGrad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, 0, x, y, r);
  coreGrad.addColorStop(0, '#e9d5ff');
  coreGrad.addColorStop(0.5, '#a78bfa');
  coreGrad.addColorStop(1, '#6d28d9');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
}

function drawGem(x, y, r) {
  // Diamond shape
  const t = performance.now() / 1000;
  const pulse = 0.9 + 0.1 * Math.sin(t * 3);
  ctx.save();
  ctx.shadowColor = '#60a5fa';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#93c5fd';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.3 * pulse);
  ctx.lineTo(x + r * pulse, y);
  ctx.lineTo(x, y + r * 0.9 * pulse);
  ctx.lineTo(x - r * pulse, y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawExit(x, y, r, locked) {
  const t = performance.now() / 1000;
  const pulse = locked ? 1 : (0.9 + 0.1 * Math.sin(t * 4));
  ctx.save();
  ctx.shadowColor = locked ? '#4b5563' : '#34d399';
  ctx.shadowBlur = locked ? 4 : 16;
  ctx.font = `${r * 2.2 * pulse}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = locked ? 0.4 : 1;
  ctx.fillText('🚀', x, y);
  ctx.restore();
}

// ── Show screens ──────────────────────────────────────────────
function showClear() {
  const par = LEVELS[currentLevel].par;
  const msg = `Moves: ${moves}  |  Par: ${par}\n${moves <= par ? '🌟 Under par!' : ''}`;
  document.getElementById('clearMsg').textContent = msg;
  document.getElementById('clearScreen').classList.remove('hidden');
}

document.getElementById('nextBtn').addEventListener('click', () => {
  document.getElementById('clearScreen').classList.add('hidden');
  currentLevel++;
  if (currentLevel >= LEVELS.length) {
    document.getElementById('victoryMsg').textContent = `You cleared all ${LEVELS.length} levels!`;
    document.getElementById('victoryScreen').classList.remove('hidden');
    return;
  }
  loadLevel(currentLevel);
  draw();
});

document.getElementById('playAgainBtn').addEventListener('click', () => {
  document.getElementById('victoryScreen').classList.add('hidden');
  currentLevel = 0;
  loadLevel(0);
  draw();
});

// ── Gravity buttons ───────────────────────────────────────────
document.querySelectorAll('.grav-btn').forEach(btn => {
  btn.addEventListener('click', () => applyGravity(btn.dataset.dir));
  btn.addEventListener('touchstart', e => { e.preventDefault(); applyGravity(btn.dataset.dir); }, { passive: false });
});

// Keyboard support
document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                w:'up', s:'down', a:'left', d:'right' };
  if (map[e.key]) { e.preventDefault(); applyGravity(map[e.key]); }
});

// Swipe support
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
  if (Math.abs(dx) > Math.abs(dy)) applyGravity(dx > 0 ? 'right' : 'left');
  else applyGravity(dy > 0 ? 'down' : 'up');
}, { passive: true });

// Undo
document.getElementById('undoBtn').addEventListener('click', () => {
  if (animBall || celebrating || history.length === 0) return;
  const s = history.pop();
  ballR = s.ballR; ballC = s.ballC;
  grid = s.grid; gems = s.gems; moves = s.moves;
  updateHUD();
  draw();
});

// Start
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('titleScreen').classList.add('hidden');
  loadLevel(0);
  lastTime = performance.now();
  draw();
});

// Initial draw (behind title)
loadLevel(0);
draw();

// Redraw loop for gem/exit animations
function idleLoop() {
  if (!animBall && !celebrating) draw();
  requestAnimationFrame(idleLoop);
}
requestAnimationFrame(idleLoop);
</script>
</body>
</html>
